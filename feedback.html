<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sippin' Continents | Feedback</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="page-banner">
        <h1>Customer Feedback</h1>
        <p>How was your experience? Your feedback helps us serve you better!</p>
    </section>

    <section class="form-section">
        <h2>Submit Your Review</h2>
        <form action="#" method="get">
            <div class="form-group">
                <label>Overall Rating</label>
                <div class="radio-group">
                    <div><input type="radio" id="star5" name="rating" value="5" required><label for="star5" style="margin:0; font-weight:normal;">5 Stars (Excellent)</label></div>
                    <div><input type="radio" id="star4" name="rating" value="4"><label for="star4" style="margin:0; font-weight:normal;">4 Stars (Good)</label></div>
                    <div><input type="radio" id="star3" name="rating" value="3"><label for="star3" style="margin:0; font-weight:normal;">3 Stars (Average)</label></div>
                    <div><input type="radio" id="star2" name="rating" value="2"><label for="star2" style="margin:0; font-weight:normal;">2 Stars (Poor)</label></div>
                    <div><input type="radio" id="star1" name="rating" value="1"><label for="star1" style="margin:0; font-weight:normal;">1 Star (Terrible)</label></div>
                </div>
            </div>

            <div class="form-group">
                <label for="visit-date">Date of Visit</label>
                <input type="date" id="visit-date" name="visit-date" required>
            </div>

            <div class="form-group">
                <label for="branch">Which branch did you visit?</label>
                <select id="branch" name="branch" required>
                    <option value="" disabled selected>Select a branch...</option>
                    <option value="zamalek">Zamalek, Cairo</option>
                    <option value="newcairo">New Cairo</option>
                    <option value="alexandria">Alexandria</option>
                    <option value="luxor">Luxor</option>
                    <option value="sharm">Sharm El-Sheikh</option>
                </select>
            </div>

            <div class="form-group">
                <label for="comments">What did you love? What can we improve?</label>
                <textarea id="comments" name="comments" required placeholder="Write your review here..."></textarea>
            </div>

            <button type="submit" class="submit-btn">Submit Feedback</button>
        </form>
    </section>

    </body>
</html>
