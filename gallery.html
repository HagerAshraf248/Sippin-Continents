<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sippin' Continents | Photo Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="page-banner">
        <h1>Photo Gallery</h1>
        <p>A visual taste of what awaits you at our global cafe.</p>
    </section>

    <section class="gallery-section">
        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="images/interior.png" alt="Cafe Interior">
                <div class="gallery-caption">Elegant Nile Dining Room</div>
            </div>
            <div class="gallery-item">
                <img src="images/coffee.png" alt="Premium Coffee">
                <div class="gallery-caption">Artisan Egyptian Roasts</div>
            </div>
            <div class="gallery-item">
                <img src="images/cuisine.png" alt="Global Cuisine">
                <div class="gallery-caption">Global Flavors, Local Touch</div>
            </div>
            <div class="gallery-item">
                <img src="images/hero.png" alt="Sunset View">
                <div class="gallery-caption">Sunset Views over the Nile</div>
            </div>
            <div class="gallery-item">
                <img src="images/n4.png" alt="Ramen">
                <div class="gallery-caption">Spicy Tonkotsu Ramen</div>
            </div>
            <div class="gallery-item">
                <img src="images/n5.png" alt="Barista pulling espresso">
                <div class="gallery-caption">Fresh roasted beans</div>
            </div>
        </div>
    </section>

</body>

</html>
