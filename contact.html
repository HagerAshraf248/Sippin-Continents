<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sippin' Continents | Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="page-banner">
        <h1>Contact Us</h1>
        <p>Looking to host an unforgettable event overlooking the Nile, or want to cater authentic global cuisine? Drop us a line.</p>
    </section>

    <section class="form-section">
        <h2>Send Us A Message</h2>
        <form action="#" method="get">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required placeholder="name">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="ex@example.com">
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="(123) 456-7890">
            </div>

            <div class="form-group">
                <label for="message">Your Message</label>
                <textarea id="message" name="message" required placeholder="How can we help you?"></textarea>
            </div>

            <button type="submit" class="submit-btn">Send Message</button>
        </form>
    </section>

    </body>
</html>
