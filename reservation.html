<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sippin' Continents | Reservations</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="page-banner">
        <h1>Book a Table</h1>
        <p>Plan your next date night, casual lunch, or family dinner.</p>
    </section>

    <section class="form-section">
        <h2>Reservation Details</h2>
        <form action="#" method="get">
            <div class="form-group">
                <label for="res-name">Reservation Name</label>
                <input type="text" id="res-name" name="res-name" required placeholder="name">
            </div>

            <div class="form-group">
                <label for="guests">Number of Guests</label>
                <input type="number" id="guests" name="guests" min="1" max="20" required value="1">
            </div>

            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" name="date" required>
            </div>

            <div class="form-group">
                <label for="time">Time</label>
                <input type="time" id="time" name="time" min="07:00" max="22:00" required>
            </div>

            <div class="form-group">
                <label for="seating">Preferred Seating Area</label>
                <select id="seating" name="seating">
                    <option value="indoor">Indoor Dining Room</option>
                    <option value="patio">Outdoor Patio</option>
                    <option value="bar">Coffee Bar</option>
                    <option value="any">Any Available</option>
                </select>
            </div>

            <div class="form-group">
                <label for="special-requests">Special Requests</label>
                <textarea id="special-requests" name="special-requests" placeholder="Allergies,..."></textarea>
            </div>

            <button type="submit" class="submit-btn">Confirm Reservation</button>
        </form>
    </section>

    </body>

</html>
